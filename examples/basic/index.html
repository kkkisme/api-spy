<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <title>api-spy — 基础示例</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 700px;
        margin: 40px auto;
        padding: 0 16px;
      }
      h2 {
        margin-bottom: 4px;
      }
      .hint {
        color: #666;
        font-size: 13px;
        margin-bottom: 16px;
      }
      .btn-group {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 20px;
      }
      button {
        padding: 8px 14px;
        cursor: pointer;
        border-radius: 4px;
        border: 1px solid #ccc;
        background: #fff;
        font-size: 13px;
      }
      button:hover {
        background: #f0f0f0;
      }
      button.danger {
        border-color: #e07070;
      }
      .log-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }
      h3 {
        margin: 0;
      }
      .badge {
        display: inline-block;
        padding: 2px 7px;
        border-radius: 10px;
        font-size: 11px;
        font-weight: bold;
        background: #e9ecef;
        color: #555;
      }
      .badge.has-events {
        background: #f8d7da;
        color: #721c24;
      }
      pre {
        background: #f8f9fa;
        border: 1px solid #e0e0e0;
        padding: 14px;
        border-radius: 6px;
        font-size: 11.5px;
        max-height: 380px;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-all;
      }
      .entry {
        border-bottom: 1px dashed #ddd;
        padding-bottom: 10px;
        margin-bottom: 10px;
      }
      .entry:last-child {
        border-bottom: none;
        margin-bottom: 0;
      }
      .entry-header {
        font-weight: bold;
        color: #c0392b;
        margin-bottom: 4px;
      }
    </style>
  </head>
  <body>
    <h2>api-spy 示例</h2>
    <p class="hint">
      通过 Service Worker mock 接口，无需外网，点击按钮即可触发上报。
    </p>

    <div class="btn-group">
      <button onclick="triggerFetch(404)">Fetch 404</button>
      <button onclick="triggerFetch(500)">Fetch 500</button>
      <button onclick="triggerFetch(429)">Fetch 429</button>
      <button onclick="triggerFetch(200)">Fetch 200（不上报）</button>
      <button onclick="triggerXhr(500)">XHR 500</button>
      <button onclick="triggerNetworkError()">Fetch 网络错误</button>
      <button class="danger" onclick="clearLog()">清空日志</button>
    </div>

    <div class="log-header">
      <h3>上报日志</h3>
      <span id="badge" class="badge">0 条</span>
    </div>
    <div id="log"><pre style="color: #999">// 等待上报事件…</pre></div>

    <script>
      // ── 加载 SDK ────────────────────────────────────────────────────────────
      // 动态插入 script，等待加载完成后再 init
      function loadScript(src) {
        return new Promise((resolve, reject) => {
          const s = document.createElement("script");
          s.src = src;
          s.onload = resolve;
          s.onerror = () => reject(new Error("Failed to load " + src));
          document.head.appendChild(s);
        });
      }

      const candidates = ["/dist/api-spy.iife.js"];

      (async () => {
        let loaded = false;
        for (const src of candidates) {
          try {
            await loadScript(src);
            loaded = true;
            break;
          } catch {
            continue;
          }
        }

        if (!loaded || typeof ApiSpy === "undefined") {
          document.getElementById("log").innerHTML =
            '<pre style="color:red">❌ 无法加载 api-spy.iife.js，请先运行：\n\n  npm run build\n\n然后用 HTTP 服务打开此页面：\n  npx serve D:/code/api-spy -l 5173\n  → http://localhost:5173/examples/basic/</pre>';
          return;
        }

        ApiSpy.spy.init({
          endpoint: "/mock/collect",
          appId: "demo-app",
          captureSnapshot: true,
          sampleRate: 1,

          // 自定义 transport：把事件打印到页面而不是真正发出去
          transport: async (events) => {
            events.forEach(appendLog);
          },

          beforeSend: (event) => {
            return { ...event, extra: { demo: true, ts: Date.now() } };
          },
        });

        console.log("[api-spy demo] SDK initialized, ApiSpy.spy:", ApiSpy.spy);
      })();

      // ── 触发函数 ─────────────────────────────────────────────────────────────
      async function triggerFetch(status) {
        // /mock/:status 由 Service Worker 拦截并返回对应状态码
        // 若 SW 不可用则请求会失败（网络错误），同样会被捕获
        await fetch("/mock/" + status).catch(() => {});
      }

      function triggerXhr(status) {
        const xhr = new XMLHttpRequest();
        xhr.open("GET", "/mock/" + status);
        xhr.send();
      }

      async function triggerNetworkError() {
        await fetch(
          "https://this-domain-does-not-exist-xyz-apyspy.invalid/api",
        ).catch(() => {});
      }

      // ── 日志渲染 ─────────────────────────────────────────────────────────────
      let count = 0;

      function appendLog(event) {
        count++;
        const badge = document.getElementById("badge");
        badge.textContent = count + " 条";
        badge.className = "badge has-events";

        // 保留原始 snapshot URL，用占位符替换后再序列化，避免巨长 base64 撑开布局
        const SNAP_KEY = "__SNAPSHOT_PLACEHOLDER__";
        const clone = JSON.parse(JSON.stringify(event));
        const snapshotUrl = clone.page?.snapshot || null;
        if (clone.page) clone.page.snapshot = snapshotUrl ? SNAP_KEY : null;

        // 先转义 HTML，再把占位符换成可点击链接（DataURL 只含安全字符，无需再转义）
        let jsonHtml = escHtml(JSON.stringify(clone, null, 2));
        if (snapshotUrl) {
          jsonHtml = jsonHtml.replace(
            `"${SNAP_KEY}"`,
            `"<a href="${snapshotUrl}" target="_blank" rel="noopener" title="在新标签页查看截图" style="color:#0078d7">📷 点击查看截图</a>"`
          );
        }

        const logEl = document.getElementById("log");
        const entry = document.createElement("div");
        entry.className = "entry";
        entry.innerHTML = `
        <div class="entry-header">
          [${new Date().toLocaleTimeString()}]
          ${event.request.type.toUpperCase()} ${event.request.method} ${event.request.url}
          → ${event.request.status || "ERR: " + (event.request.error || "?")}
          (${event.request.duration}ms)
        </div>
        <pre>${jsonHtml}</pre>
      `;

        // 如果是初始占位符，先清空
        if (logEl.querySelector("pre[style]")) logEl.innerHTML = "";
        logEl.prepend(entry);
      }

      function clearLog() {
        document.getElementById("log").innerHTML =
          '<pre style="color:#999">// 等待上报事件…</pre>';
        count = 0;
        const badge = document.getElementById("badge");
        badge.textContent = "0 条";
        badge.className = "badge";
      }

      function escHtml(str) {
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }
    </script>
  </body>
</html>
